version: '3.8'

services:
    app:
        build: .
        container_name: invoicemailer_app
        ports:
            - '3000:3000'
        env_file:
            - .env
        depends_on:
            - postgres
            - redis
        restart: unless-stopped

    postgres:
        image: postgres:16
        container_name: invoicemailer_postgres
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: invoicemailer
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        restart: unless-stopped

    redis:
        image: redis:7-alpine
        container_name: invoicemailer_redis
        ports:
            - '6379:6379'
        restart: unless-stopped

volumes:
    postgres_data:
